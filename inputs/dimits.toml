# GyroJAX input file — Dimits shift nonlinear scan (template)
# Nonlinear ITG run to study the Dimits shift: R0/LT scan near marginal stability
# Set R0_over_LT in [4.0, 4.5, 5.0, 5.5, 6.0, 6.5, 6.9] for full scan

[run]
description     = "Dimits shift nonlinear scan — R0/LT = 6.9"
method          = "deltaf"
time_integrator = "explicit"

[grid]
Npsi   = 32
Ntheta = 64
Nalpha = 64

[particles]
N_particles = 500000
loading     = "maxwellian"
vpar_cap    = 4.0

[time]
dt      = 0.025
n_steps = 2000

[geometry]
type = "salpha"
R0   = 1.0
a    = 0.18
B0   = 1.0
q0   = 1.4
q1   = 0.5

[physics]
Ti         = 1.0
Te         = 1.0
mi         = 1.0
rho_star   = 0.005556
R0_over_LT = 6.9    # scan: 4.0 .. 6.9
R0_over_Ln = 2.2
n0_avg     = 1.0
vti        = 1.0

[species]
ions      = "gyrokinetic"
electrons = "adiabatic"

[domain]
flux_tube = true

[init]
pert_amp    = 1.0e-4
single_mode = false
k_mode      = 18
zonal_init  = false

[numerics]
collision_model        = "none"
nu_krook               = 0.0
use_weight_spread      = true
weight_spread_interval = 20
use_pullback           = false
pullback_interval      = 50
nu_soft                = 0.0
k_alpha_min            = 1     # suppress n=0 aliasing for nonlinear run

[output]
diag_interval  = 5
save_phi       = true
save_particles = false
output_dir     = "results/"
