# GyroJAX input file — Rosenbluth-Hinton zonal flow residual test
# Seed a zonal perturbation and measure long-time residual vs RH theory

[run]
description     = "Rosenbluth-Hinton zonal flow residual"
method          = "deltaf"
time_integrator = "explicit"

[grid]
Npsi   = 16
Ntheta = 32
Nalpha = 32

[particles]
N_particles = 200000
loading     = "maxwellian"
vpar_cap    = 4.0

[time]
dt      = 0.05
n_steps = 400

[geometry]
type = "salpha"
R0   = 1.0
a    = 0.18
B0   = 1.0
q0   = 1.4
q1   = 0.5

[physics]
Ti         = 1.0
Te         = 1.0
mi         = 1.0
rho_star   = 0.005556
R0_over_LT = 0.0    # no drive — pure zonal flow test
R0_over_Ln = 0.0
n0_avg     = 1.0
vti        = 1.0

[species]
ions      = "gyrokinetic"
electrons = "adiabatic"

[domain]
flux_tube = true

[init]
pert_amp    = 1.0e-2
single_mode = false
k_mode      = 0
zonal_init  = true   # seed zonal (k_alpha=0) perturbation

[numerics]
collision_model        = "none"
nu_krook               = 0.0
use_weight_spread      = false
weight_spread_interval = 10
use_pullback           = false
pullback_interval      = 50
nu_soft                = 0.0
k_alpha_min            = 0

[output]
diag_interval  = 1
save_phi       = true
save_particles = false
output_dir     = "results/"
