# ITG linear benchmark — matches Dimits shift threshold
[simulation]
Npsi = 16
Ntheta = 32
Nalpha = 32
N_particles = 50000
n_steps = 200
dt = 0.05
output_file = "itg_linear.h5"
checkpoint_interval = 50

[physics]
R0_over_LT = 6.9
R0_over_Ln = 2.2
beta = 0.0

[dtype]
velocity = "bfloat16"
phi = "bfloat16"
