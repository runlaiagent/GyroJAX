# Global ITG simulation with radial profiles
[simulation]
Npsi = 32
Ntheta = 32
Nalpha = 32
N_particles = 100000
n_steps = 500
dt = 0.05
output_file = "global_itg.h5"

[physics]
R0_over_LT = 8.0
R0_over_Ln = 2.2

[flags]
global_domain = true
LT_profile = "gaussian"
LT_profile_width = 0.4
krook_buffer_width = 0.1
krook_buffer_rate = 2.0
